events { worker_connections 1024; }
http {
    upstream vllm_backend {
        server vllm:8000;
    }
    server {
        listen 80;
        location /v1/ {
            proxy_pass http://vllm_backend/v1/;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }
        location /health {
            return 200 '{"status":"ok"}';
        }
    }
}
